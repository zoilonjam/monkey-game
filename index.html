<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no"/>

<link rel="stylesheet" href="style.css">

<title>Feed the Monkey</title>
</head>

<body>

<div id="loadingScreen">
Loading Jungle...
</div>

<div class="game-container"
id="gameContainer">

<div class="mountains"></div>
<div class="fog"></div>

<div class="cloud-area">
<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>
</div>

<div class="eagle">🦅</div>

<div class="wind wind1"></div>
<div class="wind wind2"></div>
<div class="wind wind3"></div>

<div class="leaf leaf1">🍃</div>
<div class="leaf leaf2">🍂</div>
<div class="leaf leaf3">🍃</div>
<div class="leaf leaf4">🍂</div>
<div class="leaf leaf5">🍁</div>

<div class="tree tree1">
<div class="leaves"></div>
<div class="trunk"></div>
</div>

<div class="tree tree2">
<div class="leaves"></div>
<div class="trunk"></div>
</div>


<div class="mushroom mushroom1">🍄</div>
<div class="mushroom mushroom2">🍄</div>

<div class="flower flower1">🌸</div>
<div class="flower flower2">🌼</div>

<div class="butterfly butterfly1">🦋</div>
<div class="butterfly butterfly2">🦋</div>


<div class="firefly firefly1"></div>
<div class="firefly firefly2"></div>


<div class="grass"></div>

<div class="ui">

<div class="card">
Score: 
<span id="score">0</span>
</div>

<div class="card">
Bananas Caught:
<span id="bananasCaught">0</span>
</div>

<div class="card">
Lives:
<span id="lives">5</span>
</div>

<div class="card">
Level:
<span id="level">1</span>
</div>

<div class="card">
Mission:
<span id="mission">
Catch 10 bananas
</span>
</div>

<button id="pauseBtn">
⏸ Pause
</button>

</div>

<div class="banana"
id="banana">🍌</div>

<div class="monkey"
id="monkey">🐒</div>

<div class="mobile-controls">

<button class="control-btn"
id="leftBtn">⬅️</button>

<button class="control-btn"
id="rightBtn">➡️</button>

</div>

<div class="ground"></div>

<div class="screen"
id="startScreen">

<h1>
 Feed the Monkey
</h1>

<p>
Feed the monkey bananas!
</p>

<button id="startBtn">
▶ Start Game
</button>

</div>

<div class="screen"
id="gameOverScreen"
style="display:none;">

<h1>Game Over</h1>

<p id="finalText"></p>

<button onclick="location.reload()">
Play Again
</button>

</div>

<div class="screen"
id="winScreen"
style="display:none;">

<h1>Mission Complete!</h1>

<p id="winText"></p>

<button id="nextLevelBtn">
➡ Next Level
</button>

</div>

</div>
<script src="script.js"></script>

</body>
</html>
